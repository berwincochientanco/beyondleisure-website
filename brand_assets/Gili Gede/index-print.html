<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Powder Bay · Beyond Leisure</title>
<link rel="stylesheet" href="shared/colors_and_type.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--coconut-cream); font-family: var(--font-body); color: var(--driftwood); -webkit-font-smoothing: antialiased; }
  button, input, select, textarea, a { font-family: inherit; }
  ::selection { background: var(--teak-grain); color: var(--deep-canopy); }

  /* Force backgrounds + colors to print */
  html, body, * {
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
  }

  @page {
    size: A4 portrait;
    margin: 0;
  }

  @media print {
    /* Hide fixed nav — it would cover content on every page */
    nav { display: none !important; }

    /* Neutralize fixed/sticky elements */
    [style*="position: fixed"], [style*="position:fixed"] { position: static !important; }

    /* Strip viewport-height heroes so they print at natural size */
    section[style*="vh"] { min-height: 520px !important; }

    /* Avoid splitting cards/articles across pages */
    article { break-inside: avoid; page-break-inside: avoid; }
    h1, h2, h3 { break-after: avoid; page-break-after: avoid; }

    /* Drop fancy transitions / hover artefacts */
    * { transition: none !important; animation: none !important; }

    /* Give each major section breathing room without forcing breaks */
    section { break-inside: auto; }

    /* Soften any 100vh containers */
    [style*="100vh"] { min-height: 0 !important; }
  }

  html { scroll-behavior: auto; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="shared/Bits.jsx"></script>
<script type="text/babel" src="shared/Images.jsx"></script>
<script type="text/babel" src="shared/Nav.jsx"></script>
<script type="text/babel" src="shared/Footer.jsx"></script>
<script type="text/babel" src="pages/Home.jsx"></script>
<script type="text/babel">
  ReactDOM.createRoot(document.getElementById('root')).render(<Home />);

  // Auto-print once fonts, images & JSX have settled
  (async () => {
    try { await document.fonts.ready; } catch (e) {}
    // Wait for images
    const imgs = Array.from(document.images);
    await Promise.all(imgs.map(img => img.complete
      ? Promise.resolve()
      : new Promise(r => { img.onload = img.onerror = r; })));
    // Background-image url() resolution doesn't expose load events —
    // give the layout an extra beat to settle.
    await new Promise(r => setTimeout(r, 1200));
    window.print();
  })();
</script>
</body>
</html>
